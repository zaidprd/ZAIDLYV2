<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SEO.Zaidly{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .card { background:#111827; border:1px solid #1f2937; border-radius:0.75rem; }
    .input { width:100%; background:#1f2937; border:1px solid #374151; border-radius:0.5rem; padding:0.5rem 0.75rem; font-size:0.875rem; color:#fff; outline:none; }
    .input:focus { border-color:#7c3aed; box-shadow:0 0 0 1px #7c3aed; }
    .input::placeholder { color:#6b7280; }
    .label { display:block; font-size:0.75rem; font-weight:500; color:#9ca3af; margin-bottom:0.375rem; }
    .btn-primary { display:inline-flex; align-items:center; justify-content:center; gap:0.5rem; padding:0.5rem 1rem; border-radius:0.5rem; font-size:0.875rem; font-weight:500; background:#7c3aed; color:#fff; border:none; cursor:pointer; width:100%; transition:background-color 0.15s; }
    .btn-primary:hover { background:#6d28d9; }
  </style>
</head>
<body style="min-height:100vh; background:#0a0a0f; color:#fff; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;">
  {% block content %}{% endblock %}
</body>
</html>
