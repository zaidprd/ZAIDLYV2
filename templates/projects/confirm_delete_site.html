{% extends "base.html" %}
{% block title %}Hapus Site — SEO.Zaidly{% endblock %}
{% block page_title %}Hapus Site{% endblock %}
{% block content %}
<div class="max-w-sm">
  <div class="card p-6 text-center space-y-4">
    <p class="text-white font-medium">Hapus "{{ site.name }}"?</p>
    <p class="text-sm text-gray-500">{{ site.url }}</p>
    <div class="flex gap-3 justify-center">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-danger">Ya, Hapus</button>
      </form>
      <a href="{% url 'project_detail' project.pk %}" class="btn-secondary">Batal</a>
    </div>
  </div>
</div>
{% endblock %}
